<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CondoPro - Gestão de Condomínios</title>
  <style>
    :root {
      --primary: #1e40af;
      --primary-dark: #1d2f7a;
      --accent: #3b82f6;
      --success: #16a34a;
      --success-soft: #dcfce7;
      --warning: #d97706;
      --warning-soft: #fef3c7;
      --danger: #dc2626;
      --danger-soft: #fee2e2;
      --bg: #f4f7fb;
      --bg-alt: #eef4ff;
      --card: #ffffff;
      --border: #dbe3ef;
      --text: #0f172a;
      --muted: #64748b;
      --shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
      --radius: 18px;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      font-family: Inter, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
      background: var(--bg);
    }
    body { min-height: 100vh; }
    img { max-width: 100%; }
    .hidden { display: none !important; }
    .app-shell { display: grid; grid-template-columns: 292px 1fr; min-height: 100vh; }
    .sidebar {
      background: linear-gradient(180deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: white;
      padding: 24px 18px;
      box-shadow: 3px 0 18px rgba(0,0,0,0.08);
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      padding-bottom: 18px;
      margin-bottom: 18px;
      border-bottom: 1px solid rgba(255,255,255,.18);
    }
    .brand-mark,
    .brand-logo {
      width: 52px;
      height: 52px;
      border-radius: 16px;
      background: rgba(255,255,255,.14);
      border: 1px solid rgba(255,255,255,.16);
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      overflow: hidden;
    }
    .brand-mark svg { width: 28px; height: 28px; }
    .brand-logo img { width: 100%; height: 100%; object-fit: cover; }
    .brand h1 { margin: 0; font-size: 24px; letter-spacing: .2px; }
    .brand small { opacity: .82; display: block; margin-top: 3px; }
    .db-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 6px;
      padding: 5px 9px;
      border-radius: 999px;
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.16);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase;
    }
    .db-badge.gdrive {
      background: rgba(66, 133, 244, 0.2);
      border-color: rgba(66, 133, 244, 0.3);
    }
    .user-card {
      background: rgba(255,255,255,.1);
      padding: 14px;
      border-radius: 14px;
      margin-bottom: 18px;
      border: 1px solid rgba(255,255,255,.08);
    }
    .user-card strong, .user-card span { display: block; }
    .user-card span { opacity: .84; font-size: 13px; margin-top: 3px; }
    .nav { display: grid; gap: 6px; }
    .nav button {
      width: 100%;
      border: none;
      background: transparent;
      color: white;
      text-align: left;
      padding: 12px 14px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: .18s ease;
    }
    .nav button:hover, .nav button.active { background: rgba(255,255,255,.14); }
    .nav .icon-wrap {
      width: 18px;
      height: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      opacity: .96;
    }
    .nav .icon-wrap svg { width: 18px; height: 18px; }
    .sidebar-actions { margin-top: 18px; display: grid; gap: 8px; }
    .sidebar-actions button {
      border: 1px solid rgba(255,255,255,.18);
      background: rgba(255,255,255,.08);
      color: white;
      border-radius: 12px;
      padding: 10px 12px;
      cursor: pointer;
      font-weight: 700;
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: center;
      font-size: 13px;
    }
    .sidebar-actions button:hover { background: rgba(255,255,255,.14); }
    .sidebar-actions svg { width: 16px; height: 16px; }
    .main { display: flex; flex-direction: column; min-width: 0; }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      background: rgba(255,255,255,.85);
      backdrop-filter: blur(8px);
      padding: 22px 28px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .topbar h2 { margin: 0; font-size: 30px; }
    .topbar p { margin: 4px 0 0; color: var(--muted); }
    .toolbar { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .content { padding: 26px; }
    .grid { display: grid; gap: 18px; }
    .stats { grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); margin-bottom: 18px; }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
    }
    .card h3, .card h4 { margin-top: 0; margin-bottom: 12px; }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .stat-card {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
    }
    .stat-card .muted { margin-bottom: 8px; }
    .stat-value { font-size: 30px; font-weight: 800; }
    .stat-icon {
      width: 52px;
      height: 52px;
      border-radius: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #dbeafe;
      color: #1d4ed8;
    }
    .stat-icon svg { width: 24px; height: 24px; }
    .stat-icon.success { background: var(--success-soft); color: #166534; }
    .stat-icon.warning { background: var(--warning-soft); color: #92400e; }
    .stat-icon.danger { background: var(--danger-soft); color: #991b1b; }
    .muted { color: var(--muted); }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 700;
      background: #dbeafe;
      color: #1d4ed8;
    }
    .pill.success { background: var(--success-soft); color: #166534; }
    .pill.warning { background: var(--warning-soft); color: #92400e; }
    .pill.danger { background: var(--danger-soft); color: #991b1b; }
    .pill svg { width: 14px; height: 14px; }
    .btn {
      border: 1px solid var(--border);
      background: white;
      color: var(--text);
      border-radius: 12px;
      padding: 10px 16px;
      cursor: pointer;
      font-weight: 700;
      display: inline-flex;
      gap: 8px;
      align-items: center;
      font-size: 14px;
    }
    .btn svg { width: 16px; height: 16px; }
    .btn:hover { background: var(--bg); }
    .btn.primary { background: var(--primary); color: white; border-color: var(--primary); }
    .btn.primary:hover { background: var(--primary-dark); }
    .btn.success { background: var(--success); color: white; border-color: var(--success); }
    .btn.danger { background: var(--danger); color: white; border-color: var(--danger); }
    .btn.sm { padding: 7px 12px; font-size: 13px; }
    .btn.sm svg { width: 14px; height: 14px; }
    .table-wrap { overflow-x: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
      border-spacing: 0;
    }
    th, td { text-align: left; padding: 12px; border-bottom: 1px solid var(--border); }
    th { background: var(--bg-alt); font-weight: 700; color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .04em; }
    tr:hover td { background: var(--bg-alt); }
    .actions { display: flex; gap: 6px; }
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.5);
      display: grid;
      place-items: center;
      padding: 20px;
      z-index: 1000;
      animation: fadeIn .2s;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .modal {
      background: white;
      border-radius: 22px;
      box-shadow: 0 24px 60px rgba(0,0,0,.16);
      width: 100%;
      max-width: 680px;
      max-height: 90vh;
      overflow: auto;
      animation: slideUp .25s ease-out;
    }
    @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    .modal-header {
      padding: 24px 26px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }
    .modal-header h3 { margin: 0; font-size: 24px; }
    .modal-body { padding: 24px 26px; }
    .modal-footer {
      padding: 18px 26px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }
    .field { margin-bottom: 16px; }
    .field label { display: block; margin-bottom: 6px; font-weight: 700; font-size: 14px; }
    .field input, .field select, .field textarea {
      width: 100%;
      border: 1px solid var(--border);
      background: white;
      padding: 11px 14px;
      border-radius: 12px;
      font: inherit;
    }
    .field textarea { min-height: 90px; resize: vertical; }
    .subgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--text);
      color: white;
      padding: 14px 20px;
      border-radius: 14px;
      box-shadow: 0 12px 30px rgba(0,0,0,.2);
      animation: toastIn .3s ease-out;
      z-index: 2000;
    }
    @keyframes toastIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .banner {
      background: var(--bg-alt);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 16px;
      font-size: 14px;
      color: var(--muted);
    }
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    .empty svg { width: 64px; height: 64px; opacity: .3; margin-bottom: 16px; }
    select { cursor: pointer; }
    input[type="file"] { display: none; }
    
    /* Voting specific styles */
    .agenda-item {
      background: var(--bg-alt);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .agenda-item h4 {
      margin: 0 0 8px 0;
      font-size: 16px;
    }
    .vote-controls {
      display: flex;
      gap: 10px;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    .vote-btn {
      flex: 1;
      min-width: 100px;
      padding: 10px 14px;
      border-radius: 10px;
      border: 2px solid;
      background: white;
      cursor: pointer;
      font-weight: 700;
      font-size: 13px;
      transition: all 0.2s;
    }
    .vote-btn.favor {
      border-color: var(--success);
      color: var(--success);
    }
    .vote-btn.favor.selected {
      background: var(--success);
      color: white;
    }
    .vote-btn.against {
      border-color: var(--danger);
      color: var(--danger);
    }
    .vote-btn.against.selected {
      background: var(--danger);
      color: white;
    }
    .vote-btn.abstain {
      border-color: var(--warning);
      color: var(--warning);
    }
    .vote-btn.abstain.selected {
      background: var(--warning);
      color: white;
    }
    .vote-result {
      background: white;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      margin-top: 10px;
      font-size: 13px;
    }
    .vote-bar {
      height: 8px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
      margin: 8px 0;
      display: flex;
    }
    .vote-bar-segment {
      height: 100%;
      transition: width 0.3s;
    }
    .vote-bar-segment.favor { background: var(--success); }
    .vote-bar-segment.against { background: var(--danger); }
    .vote-bar-segment.abstain { background: var(--warning); }
    .vote-stats {
      display: flex;
      gap: 16px;
      font-size: 12px;
      margin-top: 6px;
    }
    .vote-stats span {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .vote-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    .vote-dot.favor { background: var(--success); }
    .vote-dot.against { background: var(--danger); }
    .vote-dot.abstain { background: var(--warning); }
    .quorum-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      margin-top: 10px;
    }
    .quorum-status.reached {
      background: var(--success-soft);
      color: var(--success);
    }
    .quorum-status.not-reached {
      background: var(--danger-soft);
      color: var(--danger);
    }
    .meeting-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
    }
    .meeting-status.draft {
      background: var(--bg-alt);
      color: var(--muted);
    }
    .meeting-status.voting {
      background: var(--warning-soft);
      color: var(--warning);
    }
    .meeting-status.closed {
      background: var(--success-soft);
      color: var(--success);
    }
    .gdrive-status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      background: rgba(66, 133, 244, 0.1);
      border: 1px solid rgba(66, 133, 244, 0.2);
      border-radius: 10px;
      font-size: 13px;
      margin-bottom: 12px;
    }
    .gdrive-status svg {
      width: 20px;
      height: 20px;
      color: #4285f4;
    }
    .gdrive-status.syncing {
      background: rgba(251, 191, 36, 0.1);
      border-color: rgba(251, 191, 36, 0.2);
    }
    .gdrive-status.syncing svg {
      color: #d97706;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>
</head>

      };
      return icons[name] || '';
    };
    
    // ============================================
    // UTILITIES
    // ============================================
    const uid = () => Date.now().toString(36) + Math.random().toString(36).substr(2);
    const byId = (id) => document.getElementById(id);
    const escapeHtml = (str) => String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
    const currentDateISO = () => new Date().toISOString().slice(0, 10);
    const money = (val) => `${Number(val).toFixed(2)}€`;
    const monthPT = (m) => ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun', 'Jul', 'Ago', 'Set', 'Out', 'Nov', 'Dez'][new Date(m).getMonth()] + '/' + new Date(m).getFullYear();
    const datePT = (d) => new Date(d).toLocaleDateString('pt-PT');
    const timePT = (d) => new Date(d).toLocaleTimeString('pt-PT', { hour: '2-digit', minute: '2-digit' });
    
    function toast(msg) {
      const el = document.createElement('div');
      el.className = 'toast';
      el.textContent = msg;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 3000);

    // ============================================
    // DATABASE (IndexedDB)
    // ============================================
    const DB = {
      name: 'CondoProDB',
      version: 2,
      async open() {
        return new Promise((resolve, reject) => {
          const req = indexedDB.open(this.name, this.version);
          req.onerror = () => reject(req.error);
          req.onsuccess = () => resolve(req.result);
          req.onupgradeneeded = (e) => {
            const db = e.target.result;
            if (!db.objectStoreNames.contains('state')) {
              db.createObjectStore('state', { keyPath: 'id' });
            }
            if (!db.objectStoreNames.contains('snapshots')) {
              db.createObjectStore('snapshots', { keyPath: 'id' });
            }
          };
        });
      },
      async read(store = 'state', key = 'main') {
        const db = await this.open();
        return new Promise((resolve, reject) => {
          const tx = db.transaction(store, 'readonly');
          const req = tx.objectStore(store).get(key);
          req.onsuccess = () => resolve(req.result);
          req.onerror = () => reject(req.error);
        });
      },
      async write(data, store = 'state', key = 'main') {
        const db = await this.open();
        return new Promise((resolve, reject) => {
          const tx = db.transaction(store, 'readwrite');
          const req = tx.objectStore(store).put({ id: key, ...data });
          req.onsuccess = () => resolve();
          req.onerror = () => reject(req.error);
        });
      },
      async getAll(store = 'snapshots') {
        const db = await this.open();
        return new Promise((resolve, reject) => {
          const tx = db.transaction(store, 'readonly');
          const req = tx.objectStore(store).getAll();
          req.onsuccess = () => resolve(req.result);
          req.onerror = () => reject(req.error);
        });
      },
      async delete(store, key) {
        const db = await this.open();
        return new Promise((resolve, reject) => {
          const tx = db.transaction(store, 'readwrite');
          const req = tx.objectStore(store).delete(key);
          req.onsuccess = () => resolve();
          req.onerror = () => reject(req.error);
        });
      }
    };
    
    // ============================================
    // GOOGLE DRIVE INTEGRATION
    // ============================================
    const GDrive = {
      isSignedIn: false,
      accessToken: null,
      folderName: 'Condominio',
      folderId: null,
      autoSyncEnabled: false,
      lastSyncTime: null,
      
      async init() {
        return new Promise((resolve) => {
          gapi.load('client:auth2', async () => {
            try {
              await gapi.client.init({
                apiKey: GOOGLE_API_KEY,
                clientId: GOOGLE_CLIENT_ID,
                discoveryDocs: DISCOVERY_DOCS,
                scope: SCOPES
              });
              
              const auth = gapi.auth2.getAuthInstance();
              this.isSignedIn = auth.isSignedIn.get();
              
              if (this.isSignedIn) {
                this.accessToken = auth.currentUser.get().getAuthResponse().access_token;
                await this.ensureFolder();
              }
              
              auth.isSignedIn.listen((signedIn) => {
                this.isSignedIn = signedIn;
                if (signedIn) {
                  this.accessToken = auth.currentUser.get().getAuthResponse().access_token;
                  this.ensureFolder();
                }
                app.render();
              });
              
              resolve();
            } catch (error) {
              console.error('Error initializing Google Drive:', error);
              resolve();
            }
          });
        });
      },
      
      async signIn() {
        try {
          await gapi.auth2.getAuthInstance().signIn();
          toast('Conectado ao Google Drive');
        } catch (error) {
          console.error('Sign-in error:', error);
          toast('Erro ao conectar com Google Drive');
        }
      },
      
      async signOut() {
        await gapi.auth2.getAuthInstance().signOut();
        this.folderId = null;
        toast('Desconectado do Google Drive');
      },
      
      async ensureFolder() {
        if (this.folderId) return this.folderId;
        
        try {
          // Search for existing folder
          const response = await gapi.client.drive.files.list({
            q: `name='${this.folderName}' and mimeType='application/vnd.google-apps.folder' and trashed=false`,
            spaces: 'drive',
            fields: 'files(id, name)'
          });
          
          if (response.result.files.length > 0) {
            this.folderId = response.result.files[0].id;
          } else {
            // Create folder
            const fileMetadata = {
              name: this.folderName,
              mimeType: 'application/vnd.google-apps.folder'
            };
            const folder = await gapi.client.drive.files.create({
              resource: fileMetadata,
              fields: 'id'
            });
            this.folderId = folder.result.id;
          }
          
          return this.folderId;
        } catch (error) {
          console.error('Error ensuring folder:', error);
          return null;
        }
      },
      
      async uploadBackup(state, filename) {
        if (!this.isSignedIn) {
          toast('Conecta-te ao Google Drive primeiro');
          return false;
        }
        
        try {
          await this.ensureFolder();
          
          const fileMetadata = {
            name: filename,
            parents: [this.folderId]
          };
          
          const formData = new FormData();
          formData.append('metadata', new Blob([JSON.stringify(fileMetadata)], { type: 'application/json' }));
          formData.append('file', new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' }));
          
          const response = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
            method: 'POST',
            headers: {
              'Authorization': `Bearer ${this.accessToken}`
            },
            body: formData
          });
          
          if (response.ok) {
            this.lastSyncTime = new Date().toISOString();
            toast('Backup guardado no Google Drive');
            return true;
          } else {
            throw new Error('Upload failed');
          }
        } catch (error) {
          console.error('Error uploading backup:', error);
          toast('Erro ao guardar no Google Drive');
          return false;
        }
      },
      
      async listBackups() {
        if (!this.isSignedIn) return [];
        
        try {
          await this.ensureFolder();
          
          const response = await gapi.client.drive.files.list({
            q: `'${this.folderId}' in parents and trashed=false`,
            spaces: 'drive',
            fields: 'files(id, name, createdTime, modifiedTime)',
            orderBy: 'modifiedTime desc'
          });
          
          return response.result.files || [];
        } catch (error) {
          console.error('Error listing backups:', error);
          return [];
        }
      },
      
      async downloadBackup(fileId) {
        if (!this.isSignedIn) return null;
        
        try {
          const response = await gapi.client.drive.files.get({
            fileId: fileId,
            alt: 'media'
          });
          
          return response.result;
        } catch (error) {
          console.error('Error downloading backup:', error);
          return null;
        }
      },
      
      async autoSync(state) {
        if (!this.autoSyncEnabled || !this.isSignedIn) return;
        
        const filename = `auto_backup_${currentDateISO()}_${Date.now()}.json`;
        await this.uploadBackup(state, filename);
      }
    };
    
    // ============================================
    // STATE MANAGEMENT
    // ============================================
    function normalizeState(data) {
      return {
        users: data.users || [],
        payments: data.payments || [],
        issues: data.issues || [],
        meetings: data.meetings || [],
        settings: {
          condoName: data.settings?.condoName || 'Meu Condomínio',
          address: data.settings?.address || '',
          nif: data.settings?.nif || '',
          email: data.settings?.email || '',
          phone: data.settings?.phone || '',
          logoDataUrl: data.settings?.logoDataUrl || '',
          receiptFooter: data.settings?.receiptFooter || ''
        }
      };
    }
    
    async function getState() {
      const raw = await DB.read('state', 'main');
      return normalizeState(raw || {});
    }
    
    async function saveState(state, label = '') {
      await DB.write(state, 'state', 'main');
      await createSnapshot(state, label);
      
      // Auto-sync to Google Drive if enabled
      if (GDrive.autoSyncEnabled && GDrive.isSignedIn) {
        await GDrive.autoSync(state);
      }
    }
    
    async function createSnapshot(state, label) {
      const snap = {
        id: uid(),
        when: new Date().toISOString(),
        label: label || 'Snapshot',
        state: JSON.parse(JSON.stringify(state))
      };
      await DB.write(snap, 'snapshots', snap.id);
    }
    
    async function getSnapshots() {
      const all = await DB.getAll('snapshots');
      return all.sort((a, b) => new Date(b.when) - new Date(a.when));
    }

      async login() {
        const email = byId('login_email').value.trim();
        const password = byId('login_password').value.trim();
        
        const user = this.state.users.find(u => u.email === email && u.password === password && u.active);
        
        if (user) {
          this.currentUser = user;
          this.currentView = 'dashboard';
          this.render();
          toast(`Bem-vindo, ${user.name}!`);
        } else {
          toast('Email ou password incorretos');
        }

        this.currentUser = null;
        this.currentView = 'login';
        this.render();
        toast('Sessão terminada');

    // ============================================
    // MODAL FUNCTIONS
    // ============================================
    function openModal(title, body, actionLabel, actionHandler) {
      const modal = document.createElement('div');
      modal.className = 'modal-overlay';
      modal.innerHTML = `
        <div class="modal">
          <div class="modal-header">
            <h3>${escapeHtml(title)}</h3>
            <button class="btn sm" onclick="closeModal()">
              ${icon('x')}
            </button>
          </div>
          <div class="modal-body">
            ${body}
          </div>
          ${actionLabel ? `
            <div class="modal-footer">
              <button class="btn" onclick="closeModal()">Cancelar</button>
              <button class="btn primary" id="modal_action">${escapeHtml(actionLabel)}</button>
            </div>
          ` : ''}
        </div>
      `;
      
      document.body.appendChild(modal);
      
      if (actionHandler) {
        byId('modal_action').onclick = actionHandler;
      }
    }
    
    function closeModal() {
      const modal = document.querySelector('.modal-overlay');
      if (modal) modal.remove();
    }
    
    // ============================================
    // USER MANAGEMENT
    // ============================================
    function openUserModal(id = null) {
      const u = id ? app.state.users.find(x => x.id === id) : {
        name: '', email: '', password: '', unit: '', phone: '', nif: '', quota: 0, active: true
      };
      
      openModal(
        id ? 'Editar Condómino' : 'Novo Condómino',
        `
          <div class="field">
            <label>Nome</label>
            <input id="u_name" value="${escapeHtml(u.name)}" />
          </div>
          
          <div class="subgrid">
            <div class="field">
              <label>Email</label>
              <input type="email" id="u_email" value="${escapeHtml(u.email)}" />
            </div>
            <div class="field">
              <label>Password</label>
              <input type="password" id="u_password" value="${escapeHtml(u.password || '')}" placeholder="${id ? '(manter atual)' : ''}" />
            </div>
          </div>
          
          <div class="subgrid">
            <div class="field">
              <label>Fração</label>
              <input id="u_unit" value="${escapeHtml(u.unit)}" />
            </div>
            <div class="field">
              <label>Quota Mensal (€)</label>
              <input type="number" step="0.01" id="u_quota" value="${u.quota || 0}" />
            </div>
          </div>
          
          <div class="subgrid">
            <div class="field">
              <label>Telefone</label>
              <input id="u_phone" value="${escapeHtml(u.phone || '')}" />
            </div>
            <div class="field">
              <label>NIF</label>
              <input id="u_nif" value="${escapeHtml(u.nif || '')}" />
            </div>
          </div>
          
          <div class="field">
            <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
              <input type="checkbox" id="u_active" ${u.active ? 'checked' : ''} />
              <span>Ativo</span>
            </label>
          </div>
        `,
        'Guardar',
        async () => {
          const payload = {
            name: byId('u_name').value.trim(),
            email: byId('u_email').value.trim(),
            unit: byId('u_unit').value.trim(),
            quota: parseFloat(byId('u_quota').value) || 0,
            phone: byId('u_phone').value.trim(),
            nif: byId('u_nif').value.trim(),
            active: byId('u_active').checked
          };
          
          const newPassword = byId('u_password').value.trim();
          if (newPassword || !id) {
            payload.password = newPassword || 'changeme';
          }
          
          if (!payload.name || !payload.email || !payload.unit) {
            return toast('Preenche nome, email e fração');
          }
          
          if (id) {
            Object.assign(app.state.users.find(x => x.id === id), payload);
          } else {
            app.state.users.push({
              id: uid(),
              role: 'user',
              ...payload
            });
          }
          
          await saveState(app.state, id ? 'Editou condómino' : 'Criou condómino');
          closeModal();
          await app.refresh();
          toast('Condómino guardado');
        }
      );
    }
    
    async function deleteUser(id) {
      if (!confirm('Eliminar este condómino?')) return;
      
      app.state.users = app.state.users.filter(u => u.id !== id);
      await saveState(app.state, 'Eliminou condómino');
      await app.refresh();
      toast('Condómino eliminado');
    }
    
    // ============================================
    // PAYMENT MANAGEMENT
    // ============================================
    function openPaymentModal(id = null) {
      const p = id ? app.state.payments.find(x => x.id === id) : {
        userId: '', month: currentDateISO().slice(0, 7), amount: 0, description: 'Quota', status: 'Pendente'
      };
      
      const users = app.state.users.filter(u => u.role === 'user' && u.active);
      
      openModal(
        id ? 'Editar Pagamento' : 'Novo Pagamento',
        `
          <div class="field">
            <label>Condómino</label>
            <select id="p_userId">
              <option value="">Selecionar...</option>
              ${users.map(u => `
                <option value="${u.id}" ${p.userId === u.id ? 'selected' : ''}>
                  ${escapeHtml(u.name)} (${escapeHtml(u.unit)})
                </option>
              `).join('')}
            </select>
          </div>
          
          <div class="subgrid">
            <div class="field">
              <label>Mês</label>
              <input type="month" id="p_month" value="${p.month}" />
            </div>
            <div class="field">
              <label>Valor (€)</label>
              <input type="number" step="0.01" id="p_amount" value="${p.amount}" />
            </div>
          </div>
          
          <div class="field">
            <label>Descrição</label>
            <input id="p_description" value="${escapeHtml(p.description)}" />
          </div>
          
          <div class="field">
            <label>Estado</label>
            <select id="p_status">
              <option value="Pendente" ${p.status === 'Pendente' ? 'selected' : ''}>Pendente</option>
              <option value="Pago" ${p.status === 'Pago' ? 'selected' : ''}>Pago</option>
            </select>
          </div>
        `,
        'Guardar',
        async () => {
          const payload = {
            userId: byId('p_userId').value,
            month: byId('p_month').value,
            amount: parseFloat(byId('p_amount').value) || 0,
            description: byId('p_description').value.trim(),
            status: byId('p_status').value
          };
          
          if (!payload.userId || !payload.month) {
            return toast('Seleciona condómino e mês');
          }
          
          if (id) {
            Object.assign(app.state.payments.find(x => x.id === id), payload);
          } else {
            app.state.payments.push({
              id: uid(),
              createdAt: currentDateISO(),
              paidAt: payload.status === 'Pago' ? currentDateISO() : null,
              ...payload
            });
          }
          
          await saveState(app.state, id ? 'Editou pagamento' : 'Criou pagamento');
          closeModal();
          await app.refresh();
          toast('Pagamento guardado');
        }
      );
    }
    
    async function markAsPaid(id) {
      const payment = app.state.payments.find(p => p.id === id);
      payment.status = 'Pago';
      payment.paidAt = currentDateISO();
      
      await saveState(app.state, 'Marcou pagamento como pago');
      await app.refresh();
      toast('Pagamento marcado como pago');
    }
    
    async function deletePayment(id) {
      if (!confirm('Eliminar este pagamento?')) return;
      
      app.state.payments = app.state.payments.filter(p => p.id !== id);
      await saveState(app.state, 'Eliminou pagamento');
      await app.refresh();
      toast('Pagamento eliminado');
    }

        </style></head><body>

                  <div class="muted">NIF: ${escapeHtml(s.nif)} • ${escapeHtml(s.email)} • ${escapeHtml(s.phone)}</div>

    function addAgendaItem() {
      const container = document.getElementById('agenda_items_container');
      const idx = container.children.length;
      
      const div = document.createElement('div');
      div.className = 'agenda-item';
      div.style.cssText = 'display: flex; gap: 10px; align-items: start; margin-bottom: 8px;';

        <input type="text" 
          style="flex: 1;" 
          placeholder="Título do ponto ${idx + 1}"
          data-idx="${idx}" 
          class="agenda-item-title" />

          ${icon('trash')}
        </button>
      `;
      
      container.appendChild(div);
    }
    
    function removeAgendaItem(idx) {
      const container = document.getElementById('agenda_items_container');
      const items = container.children;
      
      if (items[idx]) {
        items[idx].remove();
      }
      
      // Reindex remaining items
      Array.from(container.children).forEach((item, newIdx) => {
        const input = item.querySelector('.agenda-item-title');
        const button = item.querySelector('button');
        
        input.setAttribute('data-idx', newIdx);
        input.placeholder = `Título do ponto ${newIdx + 1}`;
        button.setAttribute('onclick', `removeAgendaItem(${newIdx})`);
      });
    }
    
    async function startVoting(id) {
      const meeting = app.state.meetings.find(m => m.id === id);
      
      if (!meeting.agendaItems || meeting.agendaItems.length === 0) {
        return toast('Adiciona pontos à ordem de trabalhos antes de iniciar a votação');
      }
      
      if (!confirm('Iniciar votação para esta reunião? Os condóminos poderão votar nos pontos da ordem de trabalhos.')) {
        return;
      }
      
      meeting.status = 'voting';
      meeting.votingStartedAt = new Date().toISOString();
      
      // Initialize votes object for each agenda item if not exists
      meeting.agendaItems.forEach(item => {
        if (!item.votes) {
          item.votes = {};
        }
      });
      
      await saveState(app.state, 'Iniciou votação');
      await app.refresh();
      toast('Votação iniciada');
    }
    
    async function closeVoting(id) {
      if (!confirm('Fechar votação? Os condóminos não poderão mais votar.')) {
        return;
      }
      
      const meeting = app.state.meetings.find(m => m.id === id);
      meeting.status = 'closed';
      meeting.votingClosedAt = new Date().toISOString();
      
      // Generate final minutes with voting results
      meeting.minutes = generateFinalMinutes(meeting);
      
      await saveState(app.state, 'Fechou votação');
      await app.refresh();
      toast('Votação fechada');
    }
    
    function generateFinalMinutes(meeting) {
      const activeUsers = app.state.users.filter(u => u.role === 'user' && u.active);
      const totalVoters = activeUsers.length;
      const quorum = Math.ceil(totalVoters / 2);
      
      let minutes = `ATA DA REUNIÃO\n`;
      minutes += `${meeting.title}\n`;
      minutes += `Data: ${datePT(meeting.date)} às ${meeting.time}\n`;
      minutes += `Local: ${meeting.place}\n\n`;
      
      minutes += `ORDEM DE TRABALHOS E VOTAÇÕES\n\n`;
      
      meeting.agendaItems.forEach((item, index) => {
        const votes = item.votes || {};
        const favor = Object.values(votes).filter(v => v === 'favor').length;
        const against = Object.values(votes).filter(v => v === 'against').length;
        const abstain = Object.values(votes).filter(v => v === 'abstain').length;
        const totalVotes = favor + against + abstain;
        
        minutes += `${index + 1}. ${item.title}\n`;
        minutes += `   Votos a favor: ${favor}\n`;
        minutes += `   Votos contra: ${against}\n`;
        minutes += `   Abstenções: ${abstain}\n`;
        minutes += `   Total de votantes: ${totalVotes} / ${totalVoters}\n`;
        minutes += `   Quórum atingido: ${totalVotes >= quorum ? 'Sim' : 'Não'}\n`;
        minutes += `   Resultado: ${favor > against ? 'APROVADO' : (favor === against ? 'EMPATE' : 'REJEITADO')}\n\n`;
      });
      
      minutes += `\nAta redigida automaticamente pelo sistema CondoPro.`;
      
      return minutes;
    }
    
    function viewMeetingVoting(id) {
      const meeting = app.state.meetings.find(m => m.id === id);
      const activeUsers = app.state.users.filter(u => u.role === 'user' && u.active);
      const totalVoters = activeUsers.length;
      const quorum = Math.ceil(totalVoters / 2);
      
      const isVoting = meeting.status === 'voting';
      const canVote = isVoting && app.currentUser.role === 'user';
      
      const agendaItemsHtml = meeting.agendaItems.map(item => {
        const votes = item.votes || {};
        const favor = Object.values(votes).filter(v => v === 'favor').length;
        const against = Object.values(votes).filter(v => v === 'against').length;
        const abstain = Object.values(votes).filter(v => v === 'abstain').length;
        const totalVotes = favor + against + abstain;
        
        const userVote = votes[app.currentUser.id];
        
        const favorPercent = totalVotes > 0 ? (favor / totalVotes * 100).toFixed(1) : 0;
        const againstPercent = totalVotes > 0 ? (against / totalVotes * 100).toFixed(1) : 0;
        const abstainPercent = totalVotes > 0 ? (abstain / totalVotes * 100).toFixed(1) : 0;
        
        return `
          <div class="agenda-item">
            <h4>${escapeHtml(item.title)}</h4>
            
            ${canVote ? `
              <div class="vote-controls">
                <button class="vote-btn favor ${userVote === 'favor' ? 'selected' : ''}" 
                  onclick="castVote('${meeting.id}', '${item.id}', 'favor')">
                  ${icon('check')} A Favor
                </button>
                <button class="vote-btn against ${userVote === 'against' ? 'selected' : ''}" 
                  onclick="castVote('${meeting.id}', '${item.id}', 'against')">
                  ${icon('x')} Contra
                </button>
                <button class="vote-btn abstain ${userVote === 'abstain' ? 'selected' : ''}" 
                  onclick="castVote('${meeting.id}', '${item.id}', 'abstain')">
                  Abstenção
                </button>
              </div>
            ` : ''}
            
            <div class="vote-result">
              <div style="display: flex; justify-content: space-between; margin-bottom: 4px;">
                <strong>Resultados</strong>
                <span>${totalVotes} / ${totalVoters} votos</span>
              </div>
              
              <div class="vote-bar">
                <div class="vote-bar-segment favor" style="width: ${favorPercent}%"></div>
                <div class="vote-bar-segment against" style="width: ${againstPercent}%"></div>
                <div class="vote-bar-segment abstain" style="width: ${abstainPercent}%"></div>
              </div>
              
              <div class="vote-stats">
                <span>
                  <div class="vote-dot favor"></div>
                  A Favor: ${favor} (${favorPercent}%)
                </span>
                <span>
                  <div class="vote-dot against"></div>
                  Contra: ${against} (${againstPercent}%)
                </span>
                <span>
                  <div class="vote-dot abstain"></div>
                  Abstenção: ${abstain} (${abstainPercent}%)
                </span>
              </div>
              
              <div class="quorum-status ${totalVotes >= quorum ? 'reached' : 'not-reached'}">
                ${totalVotes >= quorum ? icon('check') : icon('alert')}
                Quórum ${totalVotes >= quorum ? 'atingido' : 'não atingido'} (${quorum} votos necessários)
              </div>
              
              ${!isVoting ? `
                <div style="margin-top: 10px; font-weight: 700; color: ${favor > against ? 'var(--success)' : (favor === against ? 'var(--warning)' : 'var(--danger)')}">
                  Resultado: ${favor > against ? 'APROVADO' : (favor === against ? 'EMPATE' : 'REJEITADO')}
                </div>
              ` : ''}
            </div>
          </div>
        `;
      }).join('');
      
      openModal(
        `${escapeHtml(meeting.title)} - ${isVoting ? 'Votação em Curso' : 'Resultados'}`,
        `
          <div class="banner">
            ${datePT(meeting.date)} às ${escapeHtml(meeting.time)} • ${escapeHtml(meeting.place)}
            <div style="margin-top: 6px;">
              <span class="meeting-status ${meeting.status}">${meeting.status === 'voting' ? 'Votação em Curso' : 'Votação Encerrada'}</span>
            </div>
          </div>
          
          ${isVoting && canVote ? `
            <div style="background: var(--bg-alt); padding: 12px; border-radius: 10px; margin: 16px 0;">
              <strong>Vote em cada ponto da ordem de trabalhos abaixo:</strong>
            </div>
          ` : ''}
          
          ${agendaItemsHtml}
          
          ${!isVoting && meeting.minutes ? `
            <div style="margin-top: 20px;">
              <h4>Ata Final</h4>
              <div style="background: var(--bg-alt); padding: 16px; border-radius: 10px; white-space: pre-line; font-size: 13px;">
                ${escapeHtml(meeting.minutes)}
              </div>
            </div>
          ` : ''}
        `,
        null,
        null
      );
    }
    
    async function castVote(meetingId, itemId, vote) {
      const meeting = app.state.meetings.find(m => m.id === meetingId);
      const item = meeting.agendaItems.find(i => i.id === itemId);
      
      if (!item.votes) {
        item.votes = {};
      }
      
      item.votes[app.currentUser.id] = vote;
      
      await saveState(app.state, `Votou em reunião`);
      
      // Refresh the modal
      closeModal();
      viewMeetingVoting(meetingId);
      
      toast('Voto registado');
    }

    // ============================================
    // BACKUP & GOOGLE DRIVE
    // ============================================
    async function exportBackup() {
      if (!app.currentUser || app.currentUser.role !== 'admin') {
        return toast('Só a Administração pode exportar backups');
      }
      
      const data = await getState();
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `condopro_backup_${currentDateISO()}.json`;
      a.click();
      URL.revokeObjectURL(a.href);
      toast('Backup exportado');
    }
    
    async function importBackup(e) {
      if (!app.currentUser || app.currentUser.role !== 'admin') {
        toast('Só a Administração pode importar backups');
        e.target.value = '';
        return;
      }
      
      const file = e.target.files?.[0];
      if (!file) return;
      
      const reader = new FileReader();
      reader.onload = async () => {
        try {
          const data = normalizeState(JSON.parse(reader.result));
          if (!data.users || !data.payments) throw new Error('Formato inválido');
          
          await DB.write(data, 'state', 'main');
          await createSnapshot(data, 'Importação de backup');
          
          app.state = await getState();
          app.snapshots = await getSnapshots();
          
          const refreshed = app.state.users.find(u => app.currentUser && u.id === app.currentUser.id && u.active);
          app.currentUser = refreshed || null;
          
          toast('Backup importado');
          app.render();
        } catch {
          toast('Não foi possível importar o ficheiro');
        }
      };
      reader.readAsText(file);
      e.target.value = '';
    }
    
    async function exportSnapshot(snapshotId) {
      if (!app.currentUser || app.currentUser.role !== 'admin') {
        return toast('Só a Administração pode exportar snapshots');
      }
      
      const snap = app.snapshots.find(s => s.id === snapshotId);
      if (!snap) return toast('Snapshot não encontrada');
      
      const blob = new Blob([JSON.stringify(snap.state, null, 2)], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `condopro_snapshot_${String(snap.when).slice(0,19).replace(/[:T]/g,'-')}.json`;
      a.click();
      URL.revokeObjectURL(a.href);
      toast('Snapshot exportada');
    }
    
    async function restoreSnapshot(snapshotId) {
      if (!app.currentUser || app.currentUser.role !== 'admin') {
        return toast('Só a Administração pode restaurar snapshots');
      }
      
      const snap = app.snapshots.find(s => s.id === snapshotId);
      if (!snap) return toast('Snapshot não encontrada');
      
      if (!confirm('Restaurar esta snapshot e substituir o estado atual?')) return;
      
      const data = normalizeState(snap.state);
      await DB.write(data, 'state', 'main');
      await createSnapshot(data, `Restauro: ${snap.label || 'Snapshot'}`);
      await app.refresh();
      toast('Snapshot restaurada');
    }
    
    function toggleAutoSync(enabled) {
      GDrive.autoSyncEnabled = enabled;
      toast(enabled ? 'Auto-sincronização ativada' : 'Auto-sincronização desativada');
    }
    
    async function manualGDriveBackup() {
      if (!GDrive.isSignedIn) {
        return toast('Conecta-te ao Google Drive primeiro');
      }
      
      const filename = `manual_backup_${currentDateISO()}_${Date.now()}.json`;
      const success = await GDrive.uploadBackup(app.state, filename);
      
      if (success) {
        await app.refresh();
      }
    }
    
    async function showGDriveBackups() {
      const backups = await GDrive.listBackups();
      
      if (backups.length === 0) {
        return toast('Nenhum backup encontrado no Google Drive');
      }
      
      const backupsList = backups.map(b => `
        <div style="padding: 12px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;">
          <div>
            <strong>${escapeHtml(b.name)}</strong>
            <div class="muted" style="font-size: 12px; margin-top: 4px;">
              ${new Date(b.modifiedTime).toLocaleString('pt-PT')}
            </div>
          </div>
          <button class="btn sm success" onclick="restoreFromGDrive('${b.id}')">
            ${icon('download')} Restaurar
          </button>
        </div>
      `).join('');
      
      openModal(
        'Backups no Google Drive',
        `
          <div style="max-height: 400px; overflow-y: auto;">
            ${backupsList}
          </div>
        `,
        null,
        null
      );
    }
    
    async function restoreFromGDrive(fileId) {
      if (!confirm('Restaurar este backup do Google Drive? O estado atual será substituído.')) {
        return;
      }
      
      const data = await GDrive.downloadBackup(fileId);
      
      if (!data) {
        return toast('Erro ao descarregar backup');
      }
      
      try {
        const normalized = normalizeState(data);
        await DB.write(normalized, 'state', 'main');
        await createSnapshot(normalized, 'Restauração do Google Drive');
        
        app.state = await getState();
        app.snapshots = await getSnapshots();
        
        closeModal();
        await app.refresh();
        toast('Backup restaurado do Google Drive');
      } catch (error) {
        console.error('Restore error:', error);
        toast('Erro ao restaurar backup');
      }
    }
    
    // ============================================
    // INITIALIZE APP
    // ============================================
    app.init();
  </script>
</body>
</html>
