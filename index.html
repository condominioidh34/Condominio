<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CondoPro Cloud Edition</title>
  <meta name="description" content="Sistema de Gestão de Condomínios na Cloud">
  <style>
    :root {
      --primary: #1e40af;
      --primary-dark: #1d2f7a;
      --accent: #3b82f6;
      --success: #16a34a;
      --success-soft: #dcfce7;
      --warning: #d97706;
      --warning-soft: #fef3c7;
      --danger: #dc2626;
      --danger-soft: #fee2e2;
      --bg: #f4f7fb;
      --bg-alt: #eef4ff;
      --card: #ffffff;
      --border: #dbe3ef;
      --text: #0f172a;
      --muted: #64748b;
      --shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
      --radius: 18px;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      color: var(--text);
      background: var(--bg);
    }
    body { min-height: 100vh; }
    img { max-width: 100%; }
    .hidden { display: none !important; }
    
    /* Loading Screen */
    .loading-screen {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      display: grid;
      place-items: center;
      z-index: 9999;
      color: white;
    }
    .loading-spinner {
      width: 60px;
      height: 60px;
      border: 4px solid rgba(255,255,255,.2);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .loading-text {
      margin-top: 20px;
      font-size: 16px;
      opacity: 0.9;
    }
    
    /* Cloud Status Banner */
    .cloud-status {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: 8px 16px;
      background: linear-gradient(90deg, #4285f4 0%, #34a853 100%);
      color: white;
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .cloud-status.syncing {
      background: linear-gradient(90deg, #fbbc04 0%, #ea4335 100%);
    }
    .cloud-status.error {
      background: var(--danger);
    }
    
    .app-shell { display: grid; grid-template-columns: 292px 1fr; min-height: 100vh; }
    .sidebar {
      background: linear-gradient(180deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: white;
      padding: 24px 18px;
      box-shadow: 3px 0 18px rgba(0,0,0,0.08);
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      padding-bottom: 18px;
      margin-bottom: 18px;
      border-bottom: 1px solid rgba(255,255,255,.18);
    }
    .brand-mark,
    .brand-logo {
      width: 52px;
      height: 52px;
      border-radius: 16px;
      background: rgba(255,255,255,.14);
      border: 1px solid rgba(255,255,255,.16);
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      overflow: hidden;
    }
    .brand-mark svg { width: 28px; height: 28px; }
    .brand-logo img { width: 100%; height: 100%; object-fit: cover; }
    .brand h1 { margin: 0; font-size: 24px; letter-spacing: .2px; }
    .brand small { opacity: .82; display: block; margin-top: 3px; }
    .cloud-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 6px;
      padding: 5px 9px;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(66, 133, 244, 0.3), rgba(52, 168, 83, 0.3));
      border: 1px solid rgba(255,255,255,.3);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase;
    }
    .cloud-badge svg {
      width: 14px;
      height: 14px;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .user-card {
      background: rgba(255,255,255,.1);
      padding: 14px;
      border-radius: 14px;
      margin-bottom: 18px;
      border: 1px solid rgba(255,255,255,.08);
    }
    .user-card strong, .user-card span { display: block; }
    .user-card span { opacity: .84; font-size: 13px; margin-top: 3px; }
    .nav { display: grid; gap: 6px; }
    .nav button {
      width: 100%;
      border: none;
      background: transparent;
      color: white;
      text-align: left;
      padding: 12px 14px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: .18s ease;
    }
    .nav button:hover, .nav button.active { background: rgba(255,255,255,.14); }
    .nav .icon-wrap {
      width: 18px;
      height: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      opacity: .96;
    }
    .nav .icon-wrap svg { width: 18px; height: 18px; }
    .sidebar-actions { margin-top: 18px; display: grid; gap: 8px; }
    .sidebar-actions button {
      border: 1px solid rgba(255,255,255,.18);
      background: rgba(255,255,255,.08);
      color: white;
      border-radius: 12px;
      padding: 10px 12px;
      cursor: pointer;
      font-weight: 700;
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: center;
      font-size: 13px;
    }
    .sidebar-actions button:hover { background: rgba(255,255,255,.14); }
    .sidebar-actions svg { width: 16px; height: 16px; }
    .main { display: flex; flex-direction: column; min-width: 0; }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      background: rgba(255,255,255,.85);
      backdrop-filter: blur(8px);
      padding: 22px 28px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .topbar h2 { margin: 0; font-size: 30px; }
    .topbar p { margin: 4px 0 0; color: var(--muted); }
    .toolbar { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .content { padding: 26px; }
    .grid { display: grid; gap: 18px; }
    .stats { grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); margin-bottom: 18px; }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
    }
    .card h3, .card h4 { margin-top: 0; margin-bottom: 12px; }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .stat-card {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
    }
    .stat-card .muted { margin-bottom: 8px; }
    .stat-value { font-size: 30px; font-weight: 800; }
    .stat-icon {
      width: 52px;
      height: 52px;
      border-radius: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #dbeafe;
      color: #1d4ed8;
    }
    .stat-icon svg { width: 24px; height: 24px; }
    .stat-icon.success { background: var(--success-soft); color: #166534; }
    .stat-icon.warning { background: var(--warning-soft); color: #92400e; }
    .stat-icon.danger { background: var(--danger-soft); color: #991b1b; }
    .muted { color: var(--muted); }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 700;
      background: #dbeafe;
      color: #1d4ed8;
    }
    .pill.success { background: var(--success-soft); color: #166534; }
    .pill.warning { background: var(--warning-soft); color: #92400e; }
    .pill.danger { background: var(--danger-soft); color: #991b1b; }
    .pill svg { width: 14px; height: 14px; }
    .btn {
      border: 1px solid var(--border);
      background: white;
      color: var(--text);
      border-radius: 12px;
      padding: 10px 16px;
      cursor: pointer;
      font-weight: 700;
      display: inline-flex;
      gap: 8px;
      align-items: center;
      font-size: 14px;
      transition: all 0.2s;
    }
    .btn svg { width: 16px; height: 16px; }
    .btn:hover { background: var(--bg); transform: translateY(-1px); }
    .btn.primary { background: var(--primary); color: white; border-color: var(--primary); }
    .btn.primary:hover { background: var(--primary-dark); }
    .btn.success { background: var(--success); color: white; border-color: var(--success); }
    .btn.danger { background: var(--danger); color: white; border-color: var(--danger); }
    .btn.sm { padding: 7px 12px; font-size: 13px; }
    .btn.sm svg { width: 14px; height: 14px; }
    .table-wrap { overflow-x: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
      border-spacing: 0;
    }
    th, td { text-align: left; padding: 12px; border-bottom: 1px solid var(--border); }
    th { background: var(--bg-alt); font-weight: 700; color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .04em; }
    tr:hover td { background: var(--bg-alt); }
    .actions { display: flex; gap: 6px; }
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.5);
      display: grid;
      place-items: center;
      padding: 20px;
      z-index: 1000;
      animation: fadeIn .2s;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .modal {
      background: white;
      border-radius: 22px;
      box-shadow: 0 24px 60px rgba(0,0,0,.16);
      width: 100%;
      max-width: 680px;
      max-height: 90vh;
      overflow: auto;
      animation: slideUp .25s ease-out;
    }
    @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    .modal-header {
      padding: 24px 26px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }
    .modal-header h3 { margin: 0; font-size: 24px; }
    .modal-body { padding: 24px 26px; }
    .modal-footer {
      padding: 18px 26px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }
    .field { margin-bottom: 16px; }
    .field label { display: block; margin-bottom: 6px; font-weight: 700; font-size: 14px; }
    .field input, .field select, .field textarea {
      width: 100%;
      border: 1px solid var(--border);
      background: white;
      padding: 11px 14px;
      border-radius: 12px;
      font: inherit;
    }
    .field textarea { min-height: 90px; resize: vertical; }
    .subgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--text);
      color: white;
      padding: 14px 20px;
      border-radius: 14px;
      box-shadow: 0 12px 30px rgba(0,0,0,.2);
      animation: toastIn .3s ease-out;
      z-index: 2000;
      max-width: 400px;
    }
    @keyframes toastIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .banner {
      background: var(--bg-alt);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 16px;
      font-size: 14px;
      color: var(--muted);
    }
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    .empty svg { width: 64px; height: 64px; opacity: .3; margin-bottom: 16px; }
    select { cursor: pointer; }
    input[type="file"] { display: none; }
    
    /* Voting specific styles */
    .agenda-item {
      background: var(--bg-alt);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .agenda-item h4 {
      margin: 0 0 8px 0;
      font-size: 16px;
    }
    .vote-controls {
      display: flex;
      gap: 10px;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    .vote-btn {
      flex: 1;
      min-width: 100px;
      padding: 10px 14px;
      border-radius: 10px;
      border: 2px solid;
      background: white;
      cursor: pointer;
      font-weight: 700;
      font-size: 13px;
      transition: all 0.2s;
    }
    .vote-btn.favor {
      border-color: var(--success);
      color: var(--success);
    }
    .vote-btn.favor.selected {
      background: var(--success);
      color: white;
    }
    .vote-btn.against {
      border-color: var(--danger);
      color: var(--danger);
    }
    .vote-btn.against.selected {
      background: var(--danger);
      color: white;
    }
    .vote-btn.abstain {
      border-color: var(--warning);
      color: var(--warning);
    }
    .vote-btn.abstain.selected {
      background: var(--warning);
      color: white;
    }
    .vote-result {
      background: white;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      margin-top: 10px;
      font-size: 13px;
    }
    .vote-bar {
      height: 8px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
      margin: 8px 0;
      display: flex;
    }
    .vote-bar-segment {
      height: 100%;
      transition: width 0.3s;
    }
    .vote-bar-segment.favor { background: var(--success); }
    .vote-bar-segment.against { background: var(--danger); }
    .vote-bar-segment.abstain { background: var(--warning); }
    .vote-stats {
      display: flex;
      gap: 16px;
      font-size: 12px;
      margin-top: 6px;
      flex-wrap: wrap;
    }
    .vote-stats span {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .vote-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    .vote-dot.favor { background: var(--success); }
    .vote-dot.against { background: var(--danger); }
    .vote-dot.abstain { background: var(--warning); }
    .quorum-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      margin-top: 10px;
    }
    .quorum-status.reached {
      background: var(--success-soft);
      color: var(--success);
    }
    .quorum-status.not-reached {
      background: var(--danger-soft);
      color: var(--danger);
    }
    .meeting-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
    }
    .meeting-status.draft {
      background: var(--bg-alt);
      color: var(--muted);
    }
    .meeting-status.voting {
      background: var(--warning-soft);
      color: var(--warning);
    }
    .meeting-status.closed {
      background: var(--success-soft);
      color: var(--success);
    }

    /* Welcome Screen */
    .welcome-screen {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      padding: 20px;
    }
    .welcome-card {
      background: white;
      border-radius: 24px;
      padding: 40px;
      max-width: 500px;
      width: 100%;
      text-align: center;
      box-shadow: 0 24px 60px rgba(0,0,0,.2);
    }
    .welcome-card .logo {
      width: 100px;
      height: 100px;
      margin: 0 auto 24px;
      background: var(--bg-alt);
      border-radius: 24px;
      display: grid;
      place-items: center;
      color: var(--primary);
    }
    .welcome-card .logo svg {
      width: 50px;
      height: 50px;
    }
    .welcome-card h1 {
      margin: 0 0 12px;
      font-size: 32px;
      color: var(--text);
    }
    .welcome-card p {
      color: var(--muted);
      margin: 0 0 32px;
      line-height: 1.6;
    }
    .welcome-card .btn {
      width: 100%;
      justify-content: center;
      padding: 14px 20px;
      font-size: 16px;
    }
    .welcome-card .feature-list {
      margin: 24px 0;
      text-align: left;
    }
    .welcome-card .feature-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      margin-bottom: 8px;
      background: var(--bg-alt);
      border-radius: 12px;
    }
    .welcome-card .feature-item svg {
      width: 24px;
      height: 24px;
      color: var(--success);
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div id="loading" class="loading-screen">
    <div>
      <div class="loading-spinner"></div>
      <div class="loading-text">A carregar CondoPro Cloud...</div>
    </div>
  </div>
  
  <div id="cloudStatus" class="cloud-status hidden">
    <svg fill="currentColor" viewBox="0 0 20 20" width="16" height="16">
      <path d="M5.5 16a3.5 3.5 0 01-.369-6.98 4 4 0 117.753-1.977A4.5 4.5 0 1113.5 16h-8z"/>
    </svg>
    <span id="cloudStatusText">Sincronizado com Google Drive</span>
  </div>
  
  <div id="app"></div>
  
  <script src="https://apis.google.com/js/api.js"></script>
  
  <script>
    // ============================================
    // CONFIGURAÇÃO - EDITA AQUI!
    // ============================================
    const CONFIG = {

      GOOGLE_API_KEY: 'AIzaSyDZ62XDIfT4cXmnBzXkJ7Ci6Gf6LKbKhLs',
      
      // Nome da pasta no Google Drive onde os dados serão guardados
      DRIVE_FOLDER_NAME: 'Condominio',
      
      // Intervalo de sincronização automática (em milissegundos)

      SYNC_INTERVAL: 30000,
      
      // Activar modo debug (mostra logs na consola)
      DEBUG: true

    // ============================================
    // SISTEMA DE LOGGING
    // ============================================
    const log = {
      info: (...args) => CONFIG.DEBUG && console.log('[INFO]', ...args),
      error: (...args) => console.error('[ERROR]', ...args),
      warn: (...args) => CONFIG.DEBUG && console.warn('[WARN]', ...args),
      success: (...args) => CONFIG.DEBUG && console.log('[SUCCESS]', ...args)
    };
    
    // ============================================
    // ICONS
    // ============================================
    const icon = (name) => {
      const icons = {
        building: '<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>',

        euro: '<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.121 15.536c-1.171 1.952-3.07 1.952-4.242 0-1.172-1.953-1.172-5.119 0-7.072 1.171-1.952 3.07-1.952 4.242 0M8 10.5h4m-4 3h4m9-1.5a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>',

    const monthPT = (m) => ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun', 'Jul', 'Ago', 'Set', 'Out', 'Nov', 'Dez'][new Date(m).getMonth()] + '/' + new Date(m).getFullYear();
    const datePT = (d) => new Date(d).toLocaleDateString('pt-PT');
    const timePT = (d) => new Date(d).toLocaleTimeString('pt-PT', { hour: '2-digit', minute: '2-digit' });
    
    function toast(msg, duration = 3000) {
      const el = document.createElement('div');
      el.className = 'toast';
      el.textContent = msg;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), duration);
    }
    
    function updateCloudStatus(text, type = 'success') {
      const status = byId('cloudStatus');
      const statusText = byId('cloudStatusText');
      
      if (status && statusText) {
        status.className = 'cloud-status';
        if (type === 'syncing') status.classList.add('syncing');
        if (type === 'error') status.classList.add('error');
        
        statusText.textContent = text;
        status.classList.remove('hidden');
      }
    }
